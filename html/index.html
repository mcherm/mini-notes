<!DOCTYPE html>
<html lang="en-us">
<head>
    <title>Mini-Notes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="stylesheet" href="main.css" type="text/css"/>
    <script src="main.js"></script>
</head>
<body>
    <body-content id="main-page">
        <header>
            <header-text>Mini-Notes</header-text>
            <button id="logout-btn">&#x1F464;</button>
        </header>
        <nav>
            <nav-header>
                <button id="new-note">New</button>
                <input class="search" type="search" value="" placeholder="&#128269;">
            </nav-header>
            <note-list>
            </note-list>
        </nav>
        <article>
            <note-header>
                <button id="back-to-list">&#x2190; List</button>
                <input class="title" type="text" value="" tabindex="1">
                <button id="delete-note">&#x1F5D1;</button>
            </note-header>
            <textarea class="note-body" tabindex="2"></textarea>
        </article>
    </body-content>
    <body-content id="login-page">
        <header>
            <header-text>Mini-Notes</header-text>
        </header>
        <login-area>
            <login-form>
                <label for="email-entry">Email:</label>
                <input type="text" id="email-entry">
                <label for="password-entry">Password:</label>
                <input type="password" id="password-entry">
                <button id="login-btn">Login</button>
                <button id="new-account-btn">New Account</button>
            </login-form>
        </login-area>
    </body-content>
</body>
</html>
