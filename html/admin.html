<!DOCTYPE html>
<html lang="en-us">
  <head>
    <title>Mini-Notes Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="main.css" type="text/css"/>
    <link rel="stylesheet" href="admin.css" type="text/css"/>
    <script src="admin.js"></script>
  </head>
  <body class="logged-in"> <!-- assume logged in until proven otherwise -->
    <body-content id="admin-page">
      <header>
        <header-text>Mini-Notes Admin</header-text>
      </header>
      <admin-commands>
        <label for="site-data-btn">Site Data</label>
        <button id="site-data-btn">Go</button>
      </admin-commands>
    </body-content>
    <shadow-box id="site-data-display-dialog">
      <shadow-content>
        <site-data-area>
          <site-data-form>
            <label for="user-count-display">User Count:</label>
            <input type="text" id="user-count-display" disabled value="dummy">
            <label for="user-count-display">User Table Size (bytes):</label>
            <input type="text" id="user-size-display" disabled value="dummy">
            <label for="session-count-display">Session Count:</label>
            <input type="text" id="session-count-display" disabled value="dummy">
            <label for="session-count-display">Session Table Size (bytes):</label>
            <input type="text" id="session-size-display" disabled value="dummy">
            <label for="note-count-display">Note Count:</label>
            <input type="text" id="note-count-display" disabled value="dummy">
            <label for="note-count-display">Note Table Size (bytes):</label>
            <input type="text" id="note-size-display" disabled value="dummy">
          </site-data-form>
          <button id="close-site-data-shadowbox-btn">&#x2190;</button>
        </site-data-area>
      </shadow-content>
    </shadow-box>
  </body>
</html>
